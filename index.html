<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bargain Chat Widget</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(140deg,#0a1628 0%,#0d2147 55%,#0f3470 100%);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
}

/* ── Widget Shell ── */
#bw{
  width:100%;max-width:440px;height:715px;
  display:flex;flex-direction:column;
  background:#f8faff;border-radius:26px;overflow:hidden;
  box-shadow:0 28px 80px rgba(0,0,0,.45),0 8px 24px rgba(0,0,0,.22);
}

/* ── Header ── */
#bw-hdr{
  background:linear-gradient(135deg,#0d2147,#1a3d7c);
  padding:14px 18px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.hdr-av{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#2a6dd9,#1447b2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;position:relative;
}
.hdr-av::after{
  content:'';position:absolute;bottom:1px;right:1px;
  width:10px;height:10px;background:#2ecc71;
  border-radius:50%;border:2px solid #0d2147;
}
#hdr-info h2{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.1px;}
#hdr-info p {font-size:11px;color:#6ee7b7;font-weight:500;margin-top:1px;}
.hdr-chip{
  margin-left:auto;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);border-radius:8px;
  padding:5px 10px;font-size:11px;font-weight:700;
  color:#93c5fd;white-space:nowrap;letter-spacing:.3px;
}

/* ── Messages Area ── */
#bw-msgs{
  flex:1;overflow-y:auto;
  padding:14px 14px 8px;
  display:flex;flex-direction:column;gap:3px;
  scroll-behavior:smooth;-webkit-overflow-scrolling:touch;
  background:#f8faff;
}
#bw-msgs::-webkit-scrollbar{width:3px;}
#bw-msgs::-webkit-scrollbar-thumb{background:#bfcfe8;border-radius:2px;}

@keyframes msgIn{
  from{opacity:0;transform:translateY(9px) scale(.96);}
  to  {opacity:1;transform:none;}
}
.msg-row{
  display:flex;flex-direction:column;max-width:80%;
  animation:msgIn .22s cubic-bezier(.34,1.2,.64,1) both;
}
.msg-row.user{align-self:flex-end;align-items:flex-end;}
.msg-row.bot {align-self:flex-start;align-items:flex-start;}
.bubble{
  padding:10px 14px;border-radius:18px;
  font-size:14px;line-height:1.5;word-break:break-word;
}
.msg-row.user .bubble{
  background:linear-gradient(135deg,#2563eb,#1447b2);
  color:#fff;border-bottom-right-radius:4px;
}
.msg-row.bot  .bubble{background:#e8eef8;color:#0f1e3d;border-bottom-left-radius:4px;}
.msg-row.bot.ok  .bubble{background:#d1fae5;color:#064e36;border:1px solid #6ee7b7;}
.msg-row.bot.bad .bubble{background:#fee2e2;color:#7f1d1d;border:1px solid #fca5a5;}
.msg-row.bot.warn .bubble{background:#fef3c7;color:#78350f;border:1px solid #fcd34d;}
.msg-time{font-size:10px;color:#94a3b8;margin-top:2px;padding:0 3px;}
.sys-lbl{align-self:center;font-size:11px;color:#94a3b8;margin:5px 0;text-align:center;}

/* ── Typing Indicator ── */
@keyframes dotPop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.typing-bub{
  align-self:flex-start;
  background:#e8eef8;border-radius:18px;border-bottom-left-radius:4px;
  padding:12px 15px;display:flex;gap:5px;align-items:center;
  animation:msgIn .2s ease both;
}
.dot{width:6px;height:6px;background:#94a3b8;border-radius:50%;animation:dotPop 1.2s infinite ease-in-out;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

/* ── Finalize Button ── */
.fin-row{align-self:flex-start;margin-top:4px;}
.btn-fin{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 15px;border-radius:17px;border:none;
  background:#16a34a;color:#fff;
  font-size:12.5px;font-weight:700;font-family:inherit;
  cursor:pointer;letter-spacing:.2px;
  transition:background .18s,transform .12s;
  box-shadow:0 3px 10px rgba(22,163,74,.32);
}
.btn-fin:hover {background:#15803d;}
.btn-fin:active{transform:scale(.94);}
.btn-fin.done  {background:#94a3b8;box-shadow:none;pointer-events:none;}

/* ── Deal Card ── */
.deal-card{
  align-self:flex-start;background:#fff;
  border-radius:18px;border-bottom-left-radius:4px;
  border:1px solid #dbeafe;
  padding:15px 16px;display:flex;flex-direction:column;gap:10px;
  max-width:86%;animation:msgIn .3s cubic-bezier(.34,1.2,.64,1) both;
}
.dc-price{font-size:24px;font-weight:800;color:#0f1e3d;text-align:center;letter-spacing:-.8px;}
.dc-lbl  {font-size:10px;color:#64748b;text-align:center;text-transform:uppercase;letter-spacing:.6px;margin-top:-6px;}
.dc-div  {height:1px;background:#dbeafe;}
.dc-acts {display:flex;gap:8px;}
.dc-seal{
  flex:1;padding:11px 8px;border-radius:13px;border:none;
  background:#16a34a;color:#fff;
  font-size:13px;font-weight:700;font-family:inherit;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
  transition:background .18s,transform .12s;
}
.dc-seal:hover {background:#15803d;}
.dc-seal:active{transform:scale(.95);}
.dc-push{
  flex:1;padding:11px 8px;border-radius:13px;
  border:1.5px solid #bfdbfe;background:transparent;
  color:#1e3a5f;font-size:12px;font-weight:600;font-family:inherit;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;
  transition:background .18s,transform .12s;
}
.dc-push:hover {background:#eff6ff;}
.dc-push:active{transform:scale(.95);}

/* ── Vendor Panel ── */
#vendor-panel{
  display:flex;align-items:flex-end;gap:11px;
  padding:10px 14px 9px;
  background:#eff6ff;border-top:1px solid #dbeafe;flex-shrink:0;
}
#vchar{display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0;}
#vhat {font-size:20px;line-height:1;text-align:center;margin-bottom:-3px;display:block;}
#vring{
  width:54px;height:54px;border-radius:50%;border:3px solid #2563eb;
  background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:30px;transition:border-color .5s ease;
}
#vlbl{font-size:9.5px;font-weight:700;color:#64748b;letter-spacing:.4px;margin-top:4px;text-transform:uppercase;}

#vbub{
  flex:1;background:#fff;border-radius:14px;border-bottom-left-radius:3px;
  border:1px solid #dbeafe;padding:9px 12px;position:relative;
  display:flex;align-items:center;min-height:50px;
}
#vbub::before{
  content:'';position:absolute;left:-8px;bottom:11px;
  border-top:6px solid transparent;border-bottom:6px solid transparent;
  border-right:8px solid #dbeafe;
}
#vbub::after{
  content:'';position:absolute;left:-6px;bottom:12px;
  border-top:5px solid transparent;border-bottom:5px solid transparent;
  border-right:7px solid #fff;
}
#vtext{font-size:12px;line-height:1.45;color:#334155;font-style:italic;transition:opacity .25s ease;}

@keyframes vBob  {0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes vShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-4px)}35%{transform:translateX(4px)}55%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@keyframes vDroop{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(3px) rotate(-3deg)}}
@keyframes vTilt {0%,100%{transform:rotate(0deg)}50%{transform:rotate(-9deg)}}
@keyframes vPop  {0%,100%{transform:scale(1)}40%{transform:scale(1.14)}70%{transform:scale(1.06)}}
@keyframes vThink{0%,100%{transform:rotate(0)}30%{transform:rotate(6deg)}60%{transform:rotate(-4deg)}}

.va-bob  {animation:vBob   2s ease-in-out infinite;}
.va-shake{animation:vShake .55s ease-in-out 3;}
.va-droop{animation:vDroop 1.6s ease-in-out infinite;}
.va-tilt {animation:vTilt  1.1s ease-in-out infinite;}
.va-pop  {animation:vPop   .55s cubic-bezier(.34,1.56,.64,1) 2;}
.va-think{animation:vThink 1.4s ease-in-out infinite;}

/* ── Turn Tracker ── */
#turn-track{padding:5px 16px 4px;background:#fff;border-top:1px solid #e2eaf8;flex-shrink:0;}
#tt-hdr{font-size:10px;color:#94a3b8;display:flex;justify-content:space-between;margin-bottom:4px;}
#tt-bg {background:#dbeafe;border-radius:3px;height:3px;overflow:hidden;}
#tt-fill{height:3px;border-radius:3px;background:#2563eb;width:0%;transition:width .45s ease,background .45s ease;}

/* ── Quick Offer Bar ── */
#quick-bar{display:flex;gap:8px;padding:8px 14px 4px;background:#fff;flex-shrink:0;}
.qb{
  flex:1;padding:8px 4px;border-radius:11px;border:none;
  font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.2px;
  transition:transform .16s cubic-bezier(.34,1.5,.64,1),filter .16s,opacity .2s;
}
.qb:hover:not(:disabled){transform:translateY(-3px) scale(1.05);filter:brightness(1.06);}
.qb:active:not(:disabled){transform:scale(.97);}
.qb:disabled{opacity:.35;cursor:not-allowed;transform:none;filter:none;}
.qb-a{background:#dbeafe;color:#1e40af;}
.qb-b{background:#e0f2fe;color:#075985;}
.qb-c{background:#ede9fe;color:#4c1d95;}

/* ── Input Area ── */
#bw-inp-area{
  display:flex;align-items:center;gap:8px;
  padding:8px 13px 14px;background:#fff;flex-shrink:0;
}
#bw-inp{
  flex:1;border:1.5px solid #bfdbfe;border-radius:22px;
  padding:10px 16px;font-size:15px;font-family:inherit;
  color:#0f1e3d;background:#f8faff;outline:none;
  transition:border-color .2s,background .2s;
}
#bw-inp::placeholder{color:#94a3b8;}
#bw-inp:focus       {border-color:#2563eb;background:#fff;}
#bw-inp:disabled    {opacity:.5;cursor:not-allowed;}
#bw-snd{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#2563eb,#1447b2);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s,filter .18s;
  box-shadow:0 3px 10px rgba(37,99,235,.38);
}
#bw-snd:hover:not(:disabled) {filter:brightness(1.1);}
#bw-snd:active:not(:disabled){transform:scale(.91);}
#bw-snd:disabled{background:#94a3b8;box-shadow:none;cursor:not-allowed;}

@media(max-width:480px){
  body{padding:0;align-items:stretch;}
  #bw {max-width:100%;height:100dvh;border-radius:0;box-shadow:none;}
}
</style>
</head>
<body>

<div id="bw">
  <div id="bw-hdr">
    <div class="hdr-av">🏷️</div>
    <div id="hdr-info">
      <h2>Negotiate Your Price</h2>
      <p>● Online &amp; Ready to Assist</p>
    </div>
    <div class="hdr-chip">Listed: Rs.&nbsp;1500</div>
  </div>

  <div id="bw-msgs">
    <p class="sys-lbl" id="bw-sess"></p>
  </div>

  <div id="vendor-panel">
    <div id="vchar">
      <span id="vhat">🎩</span>
      <div id="vring" class="va-bob"><span id="vemoji">😊</span></div>
      <div id="vlbl">Merchant</div>
    </div>
    <div id="vbub"><div id="vtext">Good day! Welcome to our store. These are our finest goods — priced fairly, I assure you.</div></div>
  </div>

  <div id="turn-track">
    <div id="tt-hdr"><span>Negotiation rounds</span><span id="tt-cnt">0 / 4 used</span></div>
    <div id="tt-bg"><div id="tt-fill"></div></div>
  </div>

  <div id="quick-bar">
    <button class="qb qb-a" id="qb0">Rs. 1200</button>
    <button class="qb qb-b" id="qb1">Rs. 1300</button>
    <button class="qb qb-c" id="qb2">Rs. 1400</button>
  </div>

  <div id="bw-inp-area">
    <input id="bw-inp" type="text" placeholder="Enter your offer or message…" autocomplete="off"/>
    <button id="bw-snd" aria-label="Send">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <path d="M2 21L23 12 2 3v7l15 2-15 2v7z" fill="#fff"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function(){
"use strict";

/* ══ CONFIG ════════════════════════════════════════════ */
const C={
  LISTED:1500, TARGET:1200, FLOOR:1000,
  MAX_TURNS:4, MIN_TURNS:2,
  LB:850,         /* hard lower bound for quick buttons  */
  GREED_CHANCE:.30, /* 30% chance bot gets greedy near TARGET */
};

/* ══ VENDOR STATE MAP ══════════════════════════════════
   Formal commentary with personality — polite but real.
   States: welcome / happy / thinking / hesitant /
           sad / angry / greedy                          */
const V={
  welcome :{e:'😊',ring:'#2563eb',cls:'va-bob',
    txt:"Good day! Welcome to our store. These are our finest goods — priced fairly, I assure you."},
  happy   :{e:'🤩',ring:'#0ea5e9',cls:'va-pop',
    txt:"Now that is a respectable offer! I believe we can arrive at an understanding here."},
  greedy  :{e:'🤑',ring:'#7c3aed',cls:'va-think',
    txt:"Hmm… I sense there may be a little more room in your pocket, if you'll permit me to say so…"},
  thinking:{e:'🤔',ring:'#2563eb',cls:'va-tilt',
    txt:"Allow me a moment to consult my figures. You do drive a rather firm bargain, I must say…"},
  hesitant:{e:'😬',ring:'#0369a1',cls:'va-think',
    txt:"I must confess, I am uncertain. This is below what I had anticipated from a discerning customer…"},
  sad     :{e:'😢',ring:'#7c3aed',cls:'va-droop',
    txt:"I appreciate your honesty, truly — but at that price, I fear I would be operating at a loss. This is difficult."},
  angry   :{e:'😤',ring:'#dc2626',cls:'va-shake',
    txt:"I find that figure rather difficult to entertain. I trust you understand my position."},
};

/* ══ APP STATE ═════════════════════════════════════════ */
const s={
  ask        :C.LISTED,
  effectiveFloor:C.FLOOR, /* can move lower if user persistence earns it */
  turns      :0,
  closed     :false,
  lastUser   :null,
  lastBot    :null,
  history    :[],
  memWarned  :false, /* has the bot given the one-time "I remember" reminder? */
  greedUsed  :false, /* greed squeeze only fires once per session */
};

/* ══ DOM ═══════════════════════════════════════════════ */
const msgEl =document.getElementById('bw-msgs');
const inp   =document.getElementById('bw-inp');
const snd   =document.getElementById('bw-snd');
const ttCnt =document.getElementById('tt-cnt');
const ttFill=document.getElementById('tt-fill');
const vring =document.getElementById('vring');
const vemoji=document.getElementById('vemoji');
const vtext =document.getElementById('vtext');
const qBtns =['qb0','qb1','qb2'].map(id=>document.getElementById(id));

/* ══ UTILITIES ═════════════════════════════════════════ */
const now   =()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const r10   =v=>Math.round(v/10)*10;
const clamp =(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const rnd   =(lo,hi)=>Math.random()*(hi-lo)+lo;
const pick  =arr=>arr[Math.floor(Math.random()*arr.length)];

function updateTurnUI(){
  const u=Math.min(s.turns,C.MAX_TURNS);
  ttCnt.textContent=`${u} / ${C.MAX_TURNS} used`;
  const pct=(u/C.MAX_TURNS)*100;
  ttFill.style.width=pct+'%';
  ttFill.style.background=pct>=100?'#dc2626':pct>=75?'#f59e0b':'#2563eb';
}

const scrollBot=()=>{msgEl.scrollTop=msgEl.scrollHeight;};

function addMsg(html,who,variant){
  const row=document.createElement('div');
  row.className='msg-row '+who+(variant?' '+variant:'');
  const bub=document.createElement('div');bub.className='bubble';bub.innerHTML=html;
  const ts=document.createElement('div');ts.className='msg-time';ts.textContent=now();
  row.appendChild(bub);row.appendChild(ts);
  msgEl.appendChild(row);scrollBot();
}

function showTyping(){
  const el=document.createElement('div');el.className='typing-bub';el.id='_typ';
  for(let i=0;i<3;i++){const d=document.createElement('span');d.className='dot';el.appendChild(d);}
  msgEl.appendChild(el);scrollBot();return el;
}

function lockUI(yes){
  inp.disabled=yes;snd.disabled=yes;
  qBtns.forEach(b=>b.disabled=yes);
}

function botSay(html,delay,variant,cb){
  lockUI(true);
  const typ=showTyping();
  setTimeout(()=>{
    typ.remove();
    if(html) addMsg(html,'bot',variant||'');
    if(cb)   cb();
    else     {lockUI(s.closed);if(!s.closed)inp.focus();}
  },delay);
}

/* ══ VENDOR CHARACTER ══════════════════════════════════ */
function setVendor(key){
  const v=V[key];
  vring.style.borderColor=v.ring;
  vemoji.textContent=v.e;
  ['va-bob','va-shake','va-droop','va-tilt','va-pop','va-think'].forEach(c=>vring.classList.remove(c));
  void vring.offsetWidth;
  vring.classList.add(v.cls);
  vtext.style.opacity='0';
  setTimeout(()=>{vtext.textContent=v.txt;vtext.style.opacity='1';},230);
}

function vendorFor(offer){
  if(offer<750)        return'angry';
  if(offer<C.FLOOR)    return'sad';
  if(offer<C.TARGET)   return'thinking';
  return'happy';
}

/* ══ QUICK BUTTONS ═════════════════════════════════════ */
function calcQB(){
  if(s.lastUser===null||s.lastBot===null) return[1200,1300,1400];
  const lo=s.lastUser,hi=s.lastBot,gap=hi-lo;
  let vals;
  if(gap>=40){
    const q=gap/4;
    vals=[r10(lo+q),r10(lo+q*2),r10(lo+q*3)];
  }else if(gap>=20){
    vals=[r10(lo+10),r10((lo+hi)/2),r10(hi-10)];
  }else{
    const base=Math.max(C.LB,lo-20);
    vals=[base,base+10,base+20];
  }
  const out=[...new Set(vals.map(v=>clamp(r10(v),C.LB,C.LISTED)))].sort((a,b)=>a-b);
  while(out.length<3) out.push(out[out.length-1]+10);
  return out.slice(0,3);
}
function refreshQB(){
  const vals=calcQB();
  qBtns.forEach((btn,i)=>{btn.textContent=`Rs. ${vals[i]}`;btn.dataset.v=vals[i];});
}

/* ══ FINALIZE BUTTON ═══════════════════════════════════ */
function showFin(price){
  document.querySelectorAll('.fin-row').forEach(el=>el.remove());
  const row=document.createElement('div');row.className='fin-row';
  const btn=document.createElement('button');btn.className='btn-fin';
  btn.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg> Finalize at Rs. ${price}`;
  btn.onclick=()=>{
    btn.classList.add('done');btn.innerHTML=`✓ Confirmed at Rs. ${price}`;
    s.closed=true;lockUI(true);
    setTimeout(()=>showDeal(price),280);
  };
  row.appendChild(btn);msgEl.appendChild(row);scrollBot();
}

/* ══ DEAL CARD ═════════════════════════════════════════ */
function showDeal(price){
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;align-self:flex-start;gap:3px;';
  const card=document.createElement('div');card.className='deal-card';
  card.innerHTML=`
    <div class="dc-price">Rs. ${price}</div>
    <div class="dc-lbl">Agreed Price</div>
    <div class="dc-div"></div>
    <div class="dc-acts">
      <button class="dc-seal">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <path d="M20 6L9 17l-5-5" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>Seal the Deal
      </button>
      <button class="dc-push">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
          <path d="M4 4h16v11H4z" stroke="#1e3a5f" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M9 21h6M12 15v6" stroke="#1e3a5f" stroke-width="1.8" stroke-linecap="round"/>
        </svg>Negotiate Further
      </button>
    </div>`;
  const ts=document.createElement('div');ts.className='msg-time';ts.textContent=now();
  wrap.appendChild(card);wrap.appendChild(ts);
  msgEl.appendChild(wrap);scrollBot();
  lockUI(true);

  card.querySelector('.dc-seal').onclick=()=>{
    card.style.opacity='.45';card.style.pointerEvents='none';
    setVendor('happy');
    addMsg(`Excellent! The deal is confirmed at <strong>Rs. ${price}</strong>. A pleasure doing business with you. Proceeding to checkout…`,'bot','ok');
    lockUI(true);
  };
  card.querySelector('.dc-push').onclick=()=>{
    card.style.opacity='.45';card.style.pointerEvents='none';
    s.closed=false;s.ask=price;
    addMsg(`Very well. I remain at <strong>Rs. ${price}</strong>. Please present your revised offer when you are ready.`,'bot');
    setVendor('thinking');lockUI(false);inp.focus();
  };
}

/* ══ COUNTER-OFFER CALCULATOR ══════════════════════════ */
function calcCounter(offer){
  const diff=s.ask-offer;
  const drop=diff*rnd(0.20,0.50);
  return Math.max(r10(s.ask-drop),s.effectiveFloor+50);
}

/* ══ TONE DETECTOR ═════════════════════════════════════ */
function getTone(txt){
  const t=txt.toLowerCase();
  if(/please|student|kindly|humble|genuinely|struggling|tight/.test(t)) return'sym';
  if(/final|last|cash|ready|now|immediately|today/.test(t))             return'urg';
  return'neu';
}

/* ══ HESITATION ENGINE ═════════════════════════════════
   Adds realistic vendor pauses: sometimes the bot
   "almost says yes" then reconsiders before replying.   */
function hesitateDelay(base){
  /* 25% chance of an extra pause — vendor "thinks harder" */
  return Math.random()<.25 ? base+1200 : base;
}

/* ══ GREED CHECK ═══════════════════════════════════════
   When offer is in the sweet spot and it's been at least
   MIN_TURNS, the vendor sometimes squeezes for a bit more
   before agreeing. Fires at most once per session.       */
function shouldBeGreedy(offer){
  if(s.greedUsed) return false;
  if(s.turns<C.MIN_TURNS) return false;
  if(offer<C.TARGET) return false;
  return Math.random()<C.GREED_CHANCE;
}

/* ══ CORE ALGORITHM ════════════════════════════════════ */
function process(raw){
  const match=raw.match(/\d+/);
  const offer=match?parseInt(match[0],10):null;
  const tn=getTone(raw);

  if(offer===null){
    botSay("I beg your pardon — I did not catch a figure in that. Could you please state your offer as a number?",900);
    return;
  }

  /* ──────────────────────────────────────────────────
     FEATURE SET 3 — Memory Logic (revised)
     First offence: polite reminder only — no lock.
     Subsequent lower offers: silently allowed, but the
     effective floor is nudged down so the system stays
     consistent with the user's revised expectations.
     ────────────────────────────────────────────────── */
  const maxPrev=s.history.length?Math.max(...s.history):null;

  if(maxPrev!==null && offer<maxPrev){
    if(!s.memWarned){
      /* One-time polite reminder — does NOT lock or consume a turn */
      s.memWarned=true;
      setVendor('hesitant');
      botSay(
        `Pardon me, but I do recall you mentioning <strong>Rs. ${maxPrev}</strong> just a moment ago. I want to make sure we are on the same page — shall we work from that number, or would you prefer to revise your position?`,
        1600,'warn',
        ()=>{lockUI(false);inp.focus();}
      );
      return; /* return without pushing to history or incrementing turns */
    }else{
      /* Second time going lower — accept silently, adjust effective floor downward */
      s.effectiveFloor=Math.max(C.LB, Math.min(s.effectiveFloor, offer-50));
      /* Fall through to normal processing — no interrupt */
    }
  }

  /* Commit offer */
  s.turns++;updateTurnUI();
  s.history.push(offer);
  s.lastUser=offer;

  /* Vendor reacts immediately on submission */
  setVendor(vendorFor(offer));

  /* ── Step B: Above listed price ── */
  if(offer>C.LISTED){
    s.closed=true;lockUI(true);
    botSay(`That is most generous of you, though the listed price is <strong>Rs. ${C.LISTED}</strong>. I shall gratefully accept that.`,800,'ok',()=>showDeal(C.LISTED));
    return;
  }

  /* ── Step D: Turn limit exhausted ── */
  if(s.turns>C.MAX_TURNS){
    const fp=s.effectiveFloor+50;
    s.closed=true;
    if(offer>=fp){
      botSay(`I have deliberated at length and I believe <strong>Rs. ${offer}</strong> is acceptable. You have yourself a deal.`,hesitateDelay(1200),'ok',()=>showDeal(offer));
    }else{
      botSay(`I am afraid I must draw a firm line here. My absolute final price is <strong>Rs. ${fp}</strong>. I trust you will consider it fairly.`,hesitateDelay(1200),'bad',()=>showDeal(fp));
    }
    return;
  }

  /* ── Step C: Sweet spot (≥ TARGET) ── */
  if(offer>=C.TARGET){

    /* Psychological resistance — never accept on the very first offer */
    if(s.turns<C.MIN_TURNS){
      const fk=Math.min(offer+r10(rnd(20,50)),C.LISTED);
      s.ask=fk;s.lastBot=fk;
      setVendor('greedy');
      const lines=[
        `You are close, I must say. However, I had my sights set on <strong>Rs. ${fk}</strong>. Could you meet me there?`,
        `That is a fair opening, but I would feel more comfortable at <strong>Rs. ${fk}</strong>. Shall we?`,
        `Appreciated — though I must respectfully hold at <strong>Rs. ${fk}</strong> for the moment. I hope you understand.`,
      ];
      botSay(pick(lines),hesitateDelay(1800),'',()=>{refreshQB();lockUI(false);inp.focus();});
      return;
    }

    /* Greed mechanic — bot squeezes once even at a fair offer */
    if(shouldBeGreedy(offer)){
      s.greedUsed=true;
      const greedAsk=Math.min(offer+r10(rnd(10,30)),C.LISTED);
      s.ask=greedAsk;s.lastBot=greedAsk;
      setVendor('greedy');
      const gl=[
        `I was almost inclined to agree… but then I thought — what if you could do just a touch more? Say, <strong>Rs. ${greedAsk}</strong>? It would make my day considerably.`,
        `You know, I was on the verge of saying yes. And yet — if you could manage <strong>Rs. ${greedAsk}</strong>, I truly believe we would both be very satisfied.`,
        `A reasonable figure, I grant you. But between us, I suspect <strong>Rs. ${greedAsk}</strong> is not entirely beyond reach. Am I wrong?`,
      ];
      botSay(pick(gl),hesitateDelay(2200),'',()=>{refreshQB();lockUI(false);inp.focus();});
      return;
    }

    /* Genuine acceptance */
    s.closed=true;
    const msg=tn==='urg'
      ?`Since you are clearly prepared to proceed — <strong>Rs. ${offer}</strong> is agreed. I appreciate your decisiveness.`
      :`Very well. You have been patient and I respect that. <strong>Rs. ${offer}</strong> — we have a deal.`;
    botSay(msg,hesitateDelay(1400),'ok',()=>showDeal(offer));
    return;
  }

  /* ── Step E: Below floor ── */
  if(offer<s.effectiveFloor){
    if(tn==='sym'){
      const gap=s.ask-s.effectiveFloor;
      const disc=r10(gap*rnd(0.15,0.30));
      const sa=Math.max(s.ask-disc,s.effectiveFloor+30);
      s.ask=sa;s.lastBot=sa;
      setVendor('hesitant');
      const op=pick([
        `I understand, and I genuinely wish to accommodate you.`,
        `That is a difficult position, and I am sympathetic.`,
        `I appreciate you being candid with me about your situation.`,
      ]);
      botSay(
        `${op} As a gesture of goodwill, I am prepared to reduce my price by <strong>Rs. ${disc}</strong> — bringing it to <strong>Rs. ${sa}</strong>. I do hope that helps. Please do not share this arrangement with others.`,
        hesitateDelay(2200),'',()=>{refreshQB();lockUI(false);inp.focus();showFin(sa);}
      );
    }else{
      s.lastBot=s.ask;
      setVendor('angry');
      botSay(
        `I must be candid — Rs. ${offer} is simply not workable. I would respectfully suggest you reconsider and bring your offer closer to <strong>Rs. ${r10(s.ask-100)}</strong>.`,
        hesitateDelay(2000),'bad',()=>{refreshQB();lockUI(false);inp.focus();}
      );
    }
    return;
  }

  /* ── Step F: Grind zone (effectiveFloor → TARGET-1) ── */
  const nAsk=calcCounter(offer);
  s.ask=nAsk;s.lastBot=nAsk;

  /* Hesitation flavour — some replies are more reluctant than others */
  const openers=pick([
    [
      `I have given this considerable thought, and`,
      `After reviewing my figures, I find that`,
      `This is not easy for me, I must say, but`,
      `I am stretching further than I would like, yet`,
      `My margin grows rather thin here — nonetheless,`,
    ],
    [
      `I confess I had hoped for more, but`,
      `Against my better judgement, I will say`,
      `You are a persuasive negotiator — I acknowledge that. Still,`,
      `I find myself reluctant, and yet I understand the situation —`,
    ],
  ]);
  const opener=pick(openers);
  const toneSuffix=tn==='sym'?', and because you have been courteous,':tn==='urg'?', and noting your urgency,':'';

  botSay(
    `${opener}${toneSuffix} the best I can offer at this point is <strong>Rs. ${nAsk}</strong>. I trust you will give it fair consideration.`,
    hesitateDelay(3000),'',()=>{refreshQB();lockUI(false);inp.focus();showFin(nAsk);}
  );
}

/* ══ SEND HANDLER ══════════════════════════════════════ */
function handleSend(){
  if(s.closed||inp.disabled) return;
  const txt=inp.value.trim();
  if(!txt) return;
  document.querySelectorAll('.fin-row').forEach(el=>el.remove());
  addMsg(txt,'user');
  inp.value='';lockUI(true);
  process(txt);
}

snd.addEventListener('click',handleSend);
inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}
});

qBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(btn.disabled||s.closed) return;
    inp.value=btn.dataset.v||btn.textContent.replace('Rs. ','');
    handleSend();
  });
});

/* ══ INIT ══════════════════════════════════════════════ */
document.getElementById('bw-sess').textContent='Today '+now();
refreshQB();updateTurnUI();

setTimeout(()=>{
  addMsg(
    `Good day and welcome! The listed price is <strong>Rs. ${C.LISTED}</strong>, though I am open to a reasonable discussion.<br>Please present your offer below — you have up to <strong>${C.MAX_TURNS} rounds</strong> to negotiate.`,
    'bot'
  );
  inp.focus();
},350);

})();
</script>
